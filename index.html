"combat-log"></div></div></div><script>const problems=[{p:"Find d/dx (3x² + 5x)",c:["6x","6x + 5","3x + 5","6x²"],a:1},{p:"Evaluate lim (x->3) (x² - 9)/(x - 3)",c:["3","0","6","Undefined"],a:2},{p:"Evaluate ∫ 2x dx",c:["x² + C","2x² + C","x + C","2"],a:0},{p:"Find d/dx (sin(x))",c:["cos(x)","-cos(x)","sin(x)","-sin(x)"],a:0},{p:"Evaluate lim (x->0) (sin(x)/x)",c:["0","1","Infinity","Undefined"],a:1}];let pHP=100,pMP=50,eHP=100,curIdx=0;const logBox=document.getElementById("combat-log"),choicesBox=document.getElementById("choices-box"),promptTxt=document.getElementById("prompt-txt");function addLog(e,t="info"){const n=document.createElement("div");n.style.color="damage"===t?"#ff4757":"heal"===t?"#2ed573":"#aaa",n.innerText=e,logBox.appendChild(n),logBox.scrollTop=logBox.scrollHeight}function updateUI(){document.getElementById("p-hp-bar").style.width=pHP+"%",document.getElementById("p-hp-txt").innerText=pHP+"/100",document.getElementById("p-mp-bar").style.width=pMP*2+"%",document.getElementById("p-mp-txt").innerText=pMP+"/50",document.getElementById("e-hp-bar").style.width=eHP+"%",document.getElementById("e-hp-txt").innerText=eHP+"/100"}function loadProb(){const e=problems[curIdx];promptTxt.innerText=e.p,choicesBox.innerHTML="",e.c.forEach((t,n)=>{const o=document.createElement("button");o.innerText=t,o.onclick=()=>checkAns(n),choicesBox.appendChild(o)})}function checkAns(e){const t=problems[curIdx];e===t.a?(eHP=Math.max(0,eHP-25),addLog("✨ Correct! You dealt 25 DMG to the Calculus Fiend!","heal")):(pHP=Math.max(0,pHP-20),addLog("💥 Incorrect! The monster retaliated for 20 DMG!","damage")),updateUI(),eHP<=0?(promptTxt.innerText="🏆 Victory! The monster was integrated to zero!",choicesBox.innerHTML="") : pHP<=0?(promptTxt.innerText="💀 Defeat! Your functions collapsed under the limit pressure.",choicesBox.innerHTML="") : (curIdx=(curIdx+1)%problems.length,setTimeout(loadProb,1500))}addLog("A wild Calculus Boss blocks your path! Cast your spells by solving problems."),upda
